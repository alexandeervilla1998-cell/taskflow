# ============================================================
# Perfil de produccion - todas las variables via env vars
# ============================================================

# Base de datos
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Logging
logging.level.root=WARN
logging.level.com.taskflow=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# CORS - frontend origin configurable
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# JWT secret (minimo 32 chars)
app.jwt.secret=${JWT_SECRET}

# Actuator - solo health en produccion
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
